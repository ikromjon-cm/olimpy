version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: offline-khiso-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: offline_khiso
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - offline-khiso-dev-network

  redis:
    image: redis:7-alpine
    container_name: offline-khiso-redis-dev
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - offline-khiso-dev-network

  minio:
    image: minio/minio:latest
    container_name: offline-khiso-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_dev_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - offline-khiso-dev-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: offline-khiso-backend-dev
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/offline_khiso?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=dev-secret-change-in-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production
      - ADMIN_PASSCODE=admin12345
      - ESKIZ_EMAIL=${ESKIZ_EMAIL}
      - ESKIZ_PASSWORD=${ESKIZ_PASSWORD}
      - CLICK_SERVICE_ID=${CLICK_SERVICE_ID}
      - CLICK_SECRET_KEY=${CLICK_SECRET_KEY}
      - PAYME_ID=${PAYME_ID}
      - PAYME_KEY=${PAYME_KEY}
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=offline-khiso
      - FRONTEND_URL=http://localhost:3007
      - CORS_ORIGIN=http://localhost:3007
    ports:
      - "3006:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_dev_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - offline-khiso-dev-network
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: offline-khiso-frontend-dev
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=/api
      - API_PROXY_TARGET=http://backend:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3007
    ports:
      - "3007:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - offline-khiso-dev-network
    command: npm run dev

volumes:
  postgres_dev_data:
  redis_dev_data:
  minio_dev_data:
  uploads_dev_data:

networks:
  offline-khiso-dev-network:
    driver: bridge