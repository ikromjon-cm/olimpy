# ==========================================
# OFFLINE KHISO - Production Docker Compose
# ==========================================

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ok-postgres
    restart: unless-stopped
    ports:
      - "5454:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: offline_khiso
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ok-network

  # ==========================================
  # Redis Cache
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ok-redis
    restart: unless-stopped
    ports:
      - "6381:6379"
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - ok-network

  # ==========================================
  # MinIO Object Storage (S3-compatible)
  # ==========================================
  minio:
    image: minio/minio
    container_name: ok-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ok-network

  # ==========================================
  # Backend (NestJS API)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ok-backend
    restart: unless-stopped
    ports:
      - "3006:3000"
    env_file:
      - ./backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/olympiads/active"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - ok-network

  # ==========================================
  # Frontend (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ok-frontend
    restart: unless-stopped
    ports:
      - "3007:3001"
    env_file:
      - ./frontend/.env.docker
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ok-network

  # ==========================================
  # Nginx Reverse Proxy
  # ==========================================
  nginx:
    build:
      context: .
      dockerfile: ./docker/nginx.Dockerfile
    container_name: ok-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_ssl:/etc/nginx/ssl
      - nginx_certbot:/var/www/certbot
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - ok-network

  # ==========================================
  # Certbot (Let's Encrypt - One-shot SSL setup)
  # ==========================================
  # Certbot writes to nginx_ssl volume at /etc/letsencrypt/
  # and copies final certs to /etc/nginx/ssl/ (same volume, different mount path)
  # Nginx reads certs from /etc/nginx/ssl/
  certbot:
    profiles:
      - ssl
    image: certbot/certbot
    container_name: ok-certbot
    restart: "no"
    volumes:
      - nginx_ssl:/etc/letsencrypt
      - nginx_ssl:/etc/nginx/ssl
      - nginx_certbot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      if [ -n \"$$DOMAIN\" ] && [ \"$$DOMAIN\" != 'localhost' ]; then
        echo '⏳ Waiting for nginx to start...';
        sleep 10;
        certbot certonly --webroot -w /var/www/certbot \
          -d $$DOMAIN \
          -d www.$$DOMAIN \
          --email $$SSL_EMAIL \
          --agree-tos \
          --non-interactive \
          --deploy-hook 'cp -f /etc/letsencrypt/live/$$DOMAIN/fullchain.pem /etc/nginx/ssl/ && cp -f /etc/letsencrypt/live/$$DOMAIN/privkey.pem /etc/nginx/ssl/';
        echo '✅ Certbot finished. Certificates will be renewed automatically.';
      else
        echo 'ℹ️  DOMAIN is localhost - skipping certbot, using self-signed certificate.';
      fi
      "
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      SSL_EMAIL: ${SSL_EMAIL:-admin@localhost}
    depends_on:
      - nginx
    networks:
      - ok-network

  # ==========================================
  # Certbot Renew (Auto-renewal cron job)
  # ==========================================
  certbot-renew:
    profiles:
      - ssl
    image: certbot/certbot
    container_name: ok-certbot-renew
    restart: unless-stopped
    volumes:
      - nginx_ssl:/etc/letsencrypt
      - nginx_ssl:/etc/nginx/ssl
      - nginx_certbot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "
      while true; do
        echo '⏰ Checking certificate renewal...';
        certbot renew --deploy-hook 'cp -f /etc/letsencrypt/live/$$DOMAIN/fullchain.pem /etc/nginx/ssl/ && cp -f /etc/letsencrypt/live/$$DOMAIN/privkey.pem /etc/nginx/ssl/';
        echo '💤 Sleeping for 12 hours...';
        sleep 43200;
      done
      "
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      - nginx
    networks:
      - ok-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  uploads_data:
    driver: local
  nginx_ssl:
    driver: local
  nginx_certbot:
    driver: local

networks:
  ok-network:
    driver: bridge
