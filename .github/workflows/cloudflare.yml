name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd frontend && npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Build with Next-on-Pages
        run: cd frontend && npx @cloudflare/next-on-pages@1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: cca93309723aa7b7983008884198715d
          projectName: olimpy
          directory: frontend/.vercel/output/static
